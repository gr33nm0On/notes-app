version: "0.1"

services:
  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py migrate document &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./media:/code/media
      - ./static:/code/static
    depends_on:
      - web