{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Список конспектов</title>
    <link rel="stylesheet" href="{% static 'document/css/style.css' %}">
</head>
<body>

<div class="form-container" id="notes-container">
</div>

<script>
async function loadNotes() {
    const container = document.getElementById('notes-container');
    container.innerHTML = '';

    try {
        const response = await fetch('/api/note/');
        const notes = await response.json();

        notes.forEach(note => {
            const card = document.createElement('div');
            card.className = 'form-card';

            let filesHTML = '';
            if (note.files && note.files.length > 0) {
                filesHTML = '<ul>';
                note.files.forEach(f => {
                    filesHTML += `<li><a href="${f.url}" target="_blank">${f.name}</a></li>`;
                });
                filesHTML += '</ul>';
            }

            card.innerHTML = `
                <div class="form-title">${note.name}</div>
                <div class="form-group">
                    <label>Описание:</label>
                    <p>${note.description || '-'}</p>
                </div>
                <div class="form-group">
                    <label>Категория:</label>
                    <p>${note.category || '-'}</p>
                </div>
                <div class="form-group">
                    <label>Файлы:</label>
                    ${filesHTML || '<p>Нет файлов</p>'}
                </div>
            `;

            container.appendChild(card);
        });

    } catch (error) {
        container.innerHTML = '<p>Ошибка при загрузке заметок</p>';
        console.error(error);
    }
}

// Загружаем заметки при загрузке страницы
window.onload = loadNotes;
</script>

</body>
</html>
