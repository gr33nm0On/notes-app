{% extends 'document/base.html' %}

{% load static %}

{% block title %}Создать конспект{% endblock %}

{% block style %}
<link rel="stylesheet" href="{% static 'document/css/style.css' %}">
{% endblock %}


{% block content %}
<div class="form-container">
    <div class="form-card">
        <div class="form-title">Создать конспект</div>

        <div class="form-group">
            <label for="name">Имя:</label>
            <input id="name" type="text">
        </div>

        <div class="form-group">
            <label for="description">Описание:</label>
            <input id="description" type="text">
        </div>


        <div class="form-group">
            <label for="category">Категория:</label>
            <select id="category">
                {% for category in categories %}
                    <option value="{{ category.id }}">
                        {{ category.name }}
                    </option>
                {% endfor %}
            </select>
        </div>


        <div class="form-group">
            <label for="date">Дата:</label>
            <input id="date" type="date">
        </div>


        <div class="form-group">
            <label for="files">Файлы:</label>
            <input type="file" name="files" id="files" multiple>
            <small>Можно выбрать несколько файлов</small>
        </div>

        <button type="submit" id="submit-btn" class="submit-btn">
            Отправить
        </button>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{% static 'document/js/main.js' %}"></script>
{% endblock %}
